<!DOCTYPE html>
<html lang="pt-br">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>{% block title %}Shopping Átria{% endblock %}</title>

        <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='style/atria.css') }}">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">

    </head>

    <body>

        <div class="parallax"></div>
        <div class="background"></div>

        <header class="header">

            <div class="logo">Átria</div>

            <nav>
                <a href="{{ url_for('auth.login') }}">Entrar</a>
                <a href="{{ url_for('auth.register') }}" class="btn">Criar conta</a>
            </nav>

        </header>

        <div class="main-content">

            {% block content %}
            {% endblock %}

            <footer class="feet">

                <img 
                class="logo_branch_tech" 
                src="{{ url_for('static', filename='img/logo_welltech-dev.png') }}"
                alt="Logo WellTech">

                <p class="dev">&copy; 2026 Plataforma Átria ©</p>

            </footer>

        </div>

        <script src="{{ url_for('static', filename='js/atria.js') }}"></script>

    </body>
</html>
